name: Veille IA Quotidienne

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  veille:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          printf 'GEMINI_API_KEY=%s\nGMAIL_ADDRESS=%s\nGMAIL_APP_PASSWORD=%s\nEMAIL_DESTINATAIRE=%s\nSCORE_MINIMUM_INCLUSION=4\nNB_ARTICLES_SECONDAIRES=6\nJOURS_RETENTION=120\n' \
            "${{ secrets.GEMINI_API_KEY }}" \
            "${{ secrets.GMAIL_ADDRESS }}" \
            "${{ secrets.GMAIL_APP_PASSWORD }}" \
            "${{ secrets.EMAIL_DESTINATAIRE }}" > .env

      - name: Run Veille IA update
        run: python veille_update.py

      - name: Configure git
        run: |
          git config user.email "bot@veille-ia.local"
          git config user.name "Veille IA Bot"

      - name: Commit updated data
        run: |
          git add data/ranking_global.json data/articles_history.json data/articles_du_jour.json data/stats.json data/articles_generes/ || true
          git diff --cached --quiet || git commit -m "Veille IA - $(date +%Y-%m-%d)"

      - name: Push changes
        run: git push
